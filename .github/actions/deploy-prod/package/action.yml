name: 'Prepare deploy package (prod)'
description: 'Assemble the deploy-package folder uploaded to the VPS'

runs:
  using: 'composite'
  steps:
    - name: Prepare deploy package
      shell: bash
      run: |
        mkdir -p deploy-package
        cp -r dist deploy-package/
        cp package.json deploy-package/
        cp pnpm-lock.yaml deploy-package/
        mkdir -p deploy-package/dist/database/seeds/data
        cp src/database/seeds/data/*.json deploy-package/dist/database/seeds/data/

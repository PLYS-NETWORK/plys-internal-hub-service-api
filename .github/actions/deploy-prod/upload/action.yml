name: 'Upload to VPS (prod)'
description: 'Upload deploy package to the prod VPS via SCP'

inputs:
  host:
    description: 'VPS host'
    required: true
  username:
    description: 'VPS username'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: true

runs:
  using: 'composite'
  steps:
    # SCP overlays files in place — it does NOT delete VPS files absent from
    # the new package. Wipe the previous `dist/` first so removed source files
    # don't leave stale `*.js` behind for TypeORM's entity glob to load.
    - name: Wipe previous dist on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        script: |
          set -e
          rm -rf /apps/internal-hub-be/prod/current/dist

    - name: Upload to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        source: 'deploy-package/*'
        target: '/apps/internal-hub-be/prod/current'
        strip_components: 1

name: 'Restart app on VPS (prod)'
description: 'Install prod deps, run migrations + seeds, reload PM2 (zero-downtime), and prune old backups'

inputs:
  host:
    description: 'VPS host'
    required: true
  username:
    description: 'VPS username'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Restart app on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        script: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"

          APP_DIR="/apps/internal-hub-be/prod"
          DEPLOY_DIR="$APP_DIR/current"

          cd "$DEPLOY_DIR"

          echo "==> Installing production dependencies..."
          pnpm install --frozen-lockfile --prod

          echo "==> Copying environment file..."
          cp /apps/environments/prod/.env.internal-hub-be "$DEPLOY_DIR/.env.production"

          echo "==> Running database migrations..."
          NODE_ENV=production pnpm exec typeorm migration:run -d dist/database/data-source.js

          echo "==> Running database seeds..."
          NODE_ENV=production node dist/database/seeds/seed-runner.js

          echo "==> Reloading PM2 (zero-downtime)..."
          cd "$APP_DIR"
          pm2 startOrReload ecosystem.config.js
          pm2 save

          echo "==> Cleaning old backups (keep last 3)..."
          ls -dt "$APP_DIR"/backup_* 2>/dev/null | tail -n +4 | xargs rm -rf || true

          echo "✓ internal-hub-be prod deployed successfully"

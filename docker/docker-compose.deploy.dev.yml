# Dev VPS override — use GHCR images instead of local build.
# Requires IMAGE_REGISTRY + per-service IMAGE_TAG_* in compose .env.
#
# env_file: !reset MUST be set per service (not in YAML anchors — anchors drop the tag).
# networks: !reset MUST be set per service — apps.yml sets networks: [internal], which
#   conflicts with network_mode: host below.
# network_mode: host — Postgres/Redis/gRPC on 127.0.0.1 (see GRPC_HOST in env/.env.dev).

x-vps-dev-base: &vps-dev-base
  pull_policy: always
  network_mode: host
  volumes:
    - ./.env.dev:/app/env/.env.dev:ro
  environment:
    DEPLOY_ENV: dev

services:
  identity-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/identity-service:${IMAGE_TAG_IDENTITY_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  business-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/business-service:${IMAGE_TAG_BUSINESS_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  consultant-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/consultant-service:${IMAGE_TAG_CONSULTANT_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  internal-admin-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/internal-admin-service:${IMAGE_TAG_INTERNAL_ADMIN_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  internal-task-reviewer-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/internal-task-reviewer-service:${IMAGE_TAG_INTERNAL_TASK_REVIEWER_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  finance-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/finance-service:${IMAGE_TAG_FINANCE_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  notifications-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/notifications-service:${IMAGE_TAG_NOTIFICATIONS_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  platform-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/platform-service:${IMAGE_TAG_PLATFORM_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  ai-provider-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/ai-provider-service:${IMAGE_TAG_AI_PROVIDER_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  api-gateway:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/api-gateway:${IMAGE_TAG_API_GATEWAY}
    networks: !reset
    ports: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  migrate:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/migrate:${IMAGE_TAG_MIGRATE}
    networks: !reset
    depends_on: !reset []

  postgres:
    profiles: [local-infra]
  redis:
    profiles: [local-infra]

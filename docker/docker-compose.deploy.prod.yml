# Production VPS override — use GHCR images instead of local build.
# Requires IMAGE_REGISTRY + per-service IMAGE_TAG_* in compose .env.

x-vps-prod-base: &vps-prod-base
  pull_policy: always
  network_mode: host
  volumes:
    - ./.env.prod:/app/env/.env.prod:ro
  environment:
    DEPLOY_ENV: prod

services:
  identity-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/identity-service:${IMAGE_TAG_IDENTITY_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  business-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/business-service:${IMAGE_TAG_BUSINESS_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  consultant-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/consultant-service:${IMAGE_TAG_CONSULTANT_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  internal-admin-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/internal-admin-service:${IMAGE_TAG_INTERNAL_ADMIN_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  internal-task-reviewer-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/internal-task-reviewer-service:${IMAGE_TAG_INTERNAL_TASK_REVIEWER_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  finance-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/finance-service:${IMAGE_TAG_FINANCE_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  notifications-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/notifications-service:${IMAGE_TAG_NOTIFICATIONS_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  platform-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/platform-service:${IMAGE_TAG_PLATFORM_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  ai-provider-service:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/ai-provider-service:${IMAGE_TAG_AI_PROVIDER_SERVICE}
    networks: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  api-gateway:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/api-gateway:${IMAGE_TAG_API_GATEWAY}
    networks: !reset
    ports: !reset
    depends_on: !reset []
    env_file: !reset
      - .env.prod

  migrate:
    <<: *vps-prod-base
    image: ${IMAGE_REGISTRY}/migrate:${IMAGE_TAG_MIGRATE}
    networks: !reset
    depends_on: !reset []

  postgres:
    profiles: [local-infra]
  redis:
    profiles: [local-infra]

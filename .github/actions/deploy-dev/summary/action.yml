name: 'Deployment summary (dev)'
description: 'Append the dev deployment summary to the GitHub job summary'

inputs:
  actor:
    description: 'GitHub actor who triggered the workflow'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Deployment summary
      shell: bash
      run: |
        echo "## ✅ Dev Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- **Project**: marketplace-ployos" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: development" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: develop" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ inputs.actor }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://dev.ployos.com" >> $GITHUB_STEP_SUMMARY

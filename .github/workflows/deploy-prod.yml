name: Deploy to Production — api.lona.my

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ''
      branch:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'

jobs:
  guard:
    name: Confirm deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Validate confirmation
        uses: ./.github/actions/deploy-prod/guard
        with:
          confirm: ${{ github.event.inputs.confirm }}
          branch: ${{ github.event.inputs.branch }}
          actor: ${{ github.actor }}

  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    needs: guard
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node + pnpm
        uses: ./.github/actions/deploy-prod/setup

      - name: Install & Build
        uses: ./.github/actions/deploy-prod/install-build

      - name: Prepare deploy package
        uses: ./.github/actions/deploy-prod/package

      - name: Backup current deployment
        uses: ./.github/actions/deploy-prod/backup
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}

      - name: Upload to VPS
        uses: ./.github/actions/deploy-prod/upload
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}

      - name: Restart app on VPS
        uses: ./.github/actions/deploy-prod/restart
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}

      - name: Health check
        uses: ./.github/actions/deploy-prod/health-check

      - name: Deployment summary
        if: success()
        uses: ./.github/actions/deploy-prod/summary
        with:
          branch: ${{ github.event.inputs.branch }}
          actor: ${{ github.actor }}

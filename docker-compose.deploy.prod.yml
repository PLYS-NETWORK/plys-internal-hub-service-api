version: '3.8'

# Production VPS override — use GHCR images instead of local build.
# Requires IMAGE_REGISTRY + per-service IMAGE_TAG_* in compose .env.

x-vps-prod-service: &vps-prod-service
  pull_policy: always
  extra_hosts:
    - 'host.docker.internal:host-gateway'
  volumes:
    - ./.env.prod:/app/.env.prod:ro
  env_file: !reset
    - .env.prod
  environment:
    DEPLOY_ENV: prod
    DB_HOST: host.docker.internal
    REDIS_HOST: host.docker.internal

services:
  identity-service:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/identity-service:${IMAGE_TAG_IDENTITY_SERVICE}
    depends_on: !reset []

  profiles-service:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/profiles-service:${IMAGE_TAG_PROFILES_SERVICE}
    depends_on: !reset []

  projects-service:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/projects-service:${IMAGE_TAG_PROJECTS_SERVICE}
    depends_on: !reset []

  finance-service:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/finance-service:${IMAGE_TAG_FINANCE_SERVICE}
    depends_on: !reset []

  platform-service:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/platform-service:${IMAGE_TAG_PLATFORM_SERVICE}
    depends_on: !reset []

  api-gateway:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/api-gateway:${IMAGE_TAG_API_GATEWAY}
    depends_on: !reset
      - identity-service
      - profiles-service
      - projects-service
      - finance-service
      - platform-service
    ports:
      - '3000:3000'

  migrate:
    <<: *vps-prod-service
    image: ${IMAGE_REGISTRY}/migrate:${IMAGE_TAG_MIGRATE}
    depends_on: !reset []

  postgres:
    profiles: [local-infra]
  redis:
    profiles: [local-infra]

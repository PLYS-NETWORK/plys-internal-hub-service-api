name: 'Backup current deployment (prod)'
description: 'Snapshot the current dist directory on the prod VPS before overwriting'

inputs:
  host:
    description: 'VPS host'
    required: true
  username:
    description: 'VPS username'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Backup current deployment
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        script: |
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"

          if [ -d "/apps/internal-hub-be/prod/current/dist" ]; then
            BACKUP_DIR="/apps/internal-hub-be/prod/backup_$(date +%Y%m%d_%H%M%S)"
            cp -r /apps/internal-hub-be/prod/current/dist "$BACKUP_DIR"
            echo "Backup saved to $BACKUP_DIR"
          fi

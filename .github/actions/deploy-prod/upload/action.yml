name: 'Upload to VPS (prod)'
description: 'Upload deploy package to the prod VPS via SCP'

inputs:
  host:
    description: 'VPS host'
    required: true
  username:
    description: 'VPS username'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Upload to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        source: 'deploy-package/*'
        target: '/apps/prod/current'
        strip_components: 1

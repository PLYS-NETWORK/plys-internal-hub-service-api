version: '3.8'

# Dev VPS override — use GHCR images instead of local build.
# Requires IMAGE_REGISTRY + per-service IMAGE_TAG_* in compose .env.
#
# env_file: !reset MUST be set per service (not in YAML anchors — anchors drop the tag).
# Mount .env.dev into /app for Nest/TypeORM runtime. Override loopback hosts for Docker.

x-vps-dev-base: &vps-dev-base
  pull_policy: always
  extra_hosts:
    - 'host.docker.internal:host-gateway'
  volumes:
    - ./.env.dev:/app/.env.dev:ro
  environment:
    DEPLOY_ENV: dev
    DB_HOST: host.docker.internal
    REDIS_HOST: host.docker.internal

services:
  identity-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/identity-service:${IMAGE_TAG_IDENTITY_SERVICE}
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  profiles-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/profiles-service:${IMAGE_TAG_PROFILES_SERVICE}
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  projects-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/projects-service:${IMAGE_TAG_PROJECTS_SERVICE}
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  finance-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/finance-service:${IMAGE_TAG_FINANCE_SERVICE}
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  platform-service:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/platform-service:${IMAGE_TAG_PLATFORM_SERVICE}
    depends_on: !reset []
    env_file: !reset
      - .env.dev

  api-gateway:
    <<: *vps-dev-base
    image: ${IMAGE_REGISTRY}/api-gateway:${IMAGE_TAG_API_GATEWAY}
    depends_on: !reset
      - identity-service
      - profiles-service
      - projects-service
      - finance-service
      - platform-service
    env_file: !reset
      - .env.dev
    ports:
      - '3000:3000'

  migrate:
    # Host Postgres listens on 127.0.0.1 — bridge/host.docker.internal cannot reach it.
    pull_policy: always
    network_mode: host
    volumes:
      - ./.env.dev:/app/.env.dev:ro
    env_file: !reset
      - .env.dev
    environment:
      DEPLOY_ENV: dev
    image: ${IMAGE_REGISTRY}/migrate:${IMAGE_TAG_MIGRATE}
    depends_on: !reset []

  postgres:
    profiles: [local-infra]
  redis:
    profiles: [local-infra]

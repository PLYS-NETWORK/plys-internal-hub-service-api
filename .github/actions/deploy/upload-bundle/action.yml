name: 'Upload deploy bundle to VPS'
description: 'SCP deploy bundle to VPS via SSH'

inputs:
  host:
    description: 'VPS host'
    required: true
  username:
    description: 'VPS username'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: true
  target-dir:
    description: 'Remote deploy directory'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Upload deploy bundle
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        source: 'deploy-package/*'
        target: ${{ inputs.target-dir }}
        strip_components: 1

name: Deploy to Dev — dev.ployos.com

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      # Always deploy `develop` — the dev environment tracks that branch
      # regardless of which branch the manual trigger was launched from.
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          ref: develop

      - name: Setup Node + pnpm
        uses: ./.github/actions/deploy-dev/setup

      - name: Install & Build
        uses: ./.github/actions/deploy-dev/install-build

      - name: Prepare deploy package
        uses: ./.github/actions/deploy-dev/package

      - name: Upload to VPS
        uses: ./.github/actions/deploy-dev/upload
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}

      - name: Restart app on VPS
        uses: ./.github/actions/deploy-dev/restart
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}

      - name: Health check
        uses: ./.github/actions/deploy-dev/health-check

      - name: Deployment summary
        if: success()
        uses: ./.github/actions/deploy-dev/summary
        with:
          branch: develop
          actor: ${{ github.actor }}

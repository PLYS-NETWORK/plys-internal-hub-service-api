name: 'Restart app on VPS (dev)'
description: 'Install prod deps, run migrations + seeds, and reload PM2 on the dev VPS'

inputs:
  host:
    description: 'VPS host'
    required: true
  username:
    description: 'VPS username'
    required: true
  key:
    description: 'SSH private key'
    required: true
  port:
    description: 'SSH port'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Restart app on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.username }}
        key: ${{ inputs.key }}
        port: ${{ inputs.port }}
        script: |
          set -e
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"

          APP_DIR="/apps/internal-hub-be/dev"
          DEPLOY_DIR="$APP_DIR/current"

          cd "$DEPLOY_DIR"

          echo "==> Installing production dependencies..."
          pnpm install --frozen-lockfile --prod

          echo "==> Copying environment file..."
          cp /apps/environments/dev/.env.internal-hub-be "$DEPLOY_DIR/.env.development"

          # === DESTRUCTIVE: uncomment ONLY when the initial migration's DDL
          # has been edited in place and the dev DB needs to replay it from
          # scratch. Drops the entire `public` schema (all tables, sequences,
          # types, AND the TypeORM `migrations` row) so the next
          # `typeorm migration:run` re-executes from zero. Re-comment in the
          # next commit after the deploy that needs it — otherwise every
          # subsequent dev deploy will wipe the database.
          echo "==> Resetting public schema (one-time replay)..."
          set -a; source "$DEPLOY_DIR/.env.development"; set +a
          PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USERNAME" -d "$DB_DATABASE" <<'SQL'
          DROP SCHEMA "public" CASCADE;
          CREATE SCHEMA "public";
          SQL

          echo "==> Running database migrations..."
          NODE_ENV=development pnpm exec typeorm migration:run -d dist/database/data-source.js

          echo "==> Running database seeds..."
          NODE_ENV=development node dist/database/seeds/seed-runner.js

          echo "==> Restarting PM2..."
          cd "$APP_DIR"
          pm2 startOrReload ecosystem.config.js
          pm2 save

          echo "✓ internal-hub-be dev deployed successfully"

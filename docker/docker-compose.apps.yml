  api-gateway:
    <<: *app-common
    build:
      <<: *app-build
      args:
        SERVICE: api-gateway
    environment:
      DEPLOY_ENV: ${DEPLOY_ENV:-local}
    env_file:
      - ${ENV_FILE:-../env/.env.example}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    depends_on:
      - identity-service
      - business-service
      - consultant-service
      - internal-admin-service
      - internal-task-reviewer-service
      - finance-service
      - notifications-service
      - platform-service
      - ai-provider-service

  migrate:
    profiles: [migrate]
    build:
      <<: *app-build
      args:
        SERVICE: migrate
    environment:
      DEPLOY_ENV: ${DEPLOY_ENV:-local}
    env_file:
      - ${ENV_FILE:-../env/.env.example}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
